<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz</title>
  <link href="styles.css" rel="stylesheet">

  <style>
    .quiz-header { padding: 30px 0 10px 0; text-align: center; }
    .quiz-error { display: none; text-align: center; color: #b91c1c; margin-top: 10px; font-weight: 600; }
    .quiz-scroll-area { display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 30px 0 60px 0; }
    .question-box { background: #e5e7eb; width: 100%; max-width: 900px; padding: 55px 40px; border-radius: 8px; box-shadow: var(--shadow-lg); text-align: center; }
    .question-box h2 { font-size: 1.8rem; margin-bottom: 24px; color: var(--text-dark); }
    .scale-labels { display: flex; justify-content: space-between; gap: 10px; max-width: 520px; margin: 0 auto 14px auto; color: var(--text-light); font-weight: 600; font-size: 0.95rem; }
    .options-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 22px; }
    .option-label { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; cursor: pointer; background: rgba(255, 255, 255, 0.75); border: 1px solid var(--border-color); padding: 10px 14px; border-radius: 999px; box-shadow: var(--shadow); }
    .option-label input { transform: scale(1.1); }
    .submit-wrapper { width: 100%; display: flex; justify-content: center; margin: 10px 0 80px 0; }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">Logo</div>
      <div class="user-icon">👤</div>
    </div>
  </nav>

  <main class="container">
    <header class="quiz-header">
      <h1 id="quizTitle">Loading quiz…</h1>
      <p id="quizDescription"></p>
      <div id="quizError" class="quiz-error"></div>
    </header>

    <form id="quizForm" class="quiz-scroll-area">
      <div id="quizQuestions"></div>

      <div class="submit-wrapper">
        <button type="submit" class="cta-button">SUBMIT</button>
      </div>
    </form>
  </main>

  <script src="quiz-logic.js"></script>
</body>
</html>
