<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz</title>
  <link id="theme-stylesheet" href="light.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">

  <style>
    .quiz-page {
      padding-top: 94px;
    }

    .quiz-header {
      padding: 20px 0 10px 0;
      text-align: center;
    }

    .quiz-header h1 {
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .quiz-header p {
      color: var(--text-light);
    }

    .quiz-error {
      display: none;
      text-align: center;
      color: #b91c1c;
      margin-top: 10px;
      font-weight: 600;
    }

    .quiz-scroll-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 30px 0 60px 0;
      width: 100%;
    }

    #quizQuestions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
    }

    .question-box {
      background: var(--background-alt);
      width: 100%;
      max-width: 900px;
      padding: 55px 40px;
      border-radius: 14px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      border: 1px solid var(--border-color);
    }

    .question-box h2 {
      font-size: 1.8rem;
      margin-bottom: 24px;
      color: var(--text-dark);
    }

    .scale-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      max-width: 700px;
      margin: 0 auto;
    }

    .scale-label {
      color: var(--text-light);
      font-weight: 700;
      font-size: 1.05rem;
      white-space: nowrap;
      min-width: 95px;
    }

    .options-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 22px;
    }

    .option-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      cursor: pointer;
      background: var(--background);
      border: 1px solid var(--border-color);
      padding: 10px 14px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      color: var(--text-dark);
    }

    .option-label input {
      transform: scale(1.1);
      accent-color: var(--primary-color);
    }

    .submit-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 10px 0 80px 0;
    }

    .quiz-user-icon {
      color: var(--text-dark);
      font-size: 1.3rem;
    }

    @media (max-width: 768px) {
      .question-box {
        padding: 36px 22px;
      }

      .question-box h2 {
        font-size: 1.45rem;
      }

      .scale-row {
        flex-direction: column;
        gap: 10px;
      }

      .scale-label {
        min-width: 0;
      }
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">Logo</div>
    </div>
  </nav>

  <main class="container quiz-page">
    <header class="quiz-header">
      <h1 id="quizTitle">Loading quiz...</h1>
      <p id="quizDescription"></p>
      <div id="quizError" class="quiz-error"></div>
    </header>

    <form id="quizForm" class="quiz-scroll-area">
      <div id="quizQuestions"></div>

      <div class="submit-wrapper">
        <button type="submit" class="cta-button">SUBMIT</button>
      </div>
    </form>
  </main>

  <script src="quiz-logic.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
