<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Hobby Reccomender</title> <!-- XyberBlaster-->
        <link href="styles.css" rel="stylesheet">
    </head>

    <body>
        <a></a>

        <!-- The grey border bit -->
        <div style="background-color: var(--text-dark); justify-content: space-between; align-items: center;">  
            <!-- adds a grey background to it-->
            <div class="nav-container">
                <h1 class="nav-cta" style="max-width: 120px;">Logo</h1>
                <h1 class="nav-cta" style="max-width: 240px;">Sign Up</h1>
            </div>
        </div>

        <h1 class="section-title">Hobby Reccomender</h1>
        <div class="hero-title">  <!-- hero title adds that little animation-->
            <h1 class="section-title">Discover what you love ... starting today</h1>
        </div>


        <!-- Naming -->
        <!-- Div for centering everything-->
        <div style="margin: auto; width: 400px; padding:10px">
            <label style="font-size: 20px" for="nameInput">Username:</label> 
            <input class="input-box" name="nameInput" id="nameInput" type="text">
            <br>
            <label style="font-size: 20px" for="nameInput">Password:</label> 
            <input class="input-box" name="nameInput" id="nameInput" type="text">
            <br>
            <br>
        </div>
        <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-evenly;">
            <button class="cta-button" onclick="gotoDataInput()">Data input</button> 
            <button class="cta-button" onclick="gotoCommunity()">Community page</button>
        </div>

        <script>
            function gotoDataInput() {
                // Message server
                // alert("Sending request for data input page ...");
                let url= "./data-input.html";
                let a = document.createElement("a");
                a.style = "visibility: hidden";
                a.href = url;
                a.click();
                a.remove();
            }

            function gotoCommunity() {
                // Message server
                // alert("Sending request for community page ...");
                let url= "./network%20page.html";
                let a = document.createElement("a");
                a.style = "visibility: hidden";
                a.href = url;
                a.click();
                a.remove();
            }
        </script>
    </body>
</html>
