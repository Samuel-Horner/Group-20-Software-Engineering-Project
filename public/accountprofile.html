<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <title>User Account Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="styles.css" rel="stylesheet">
    </head>

    <body>
        <div style="padding: 60px 20px 0px;">
            <h1 style="display: flex; align-items: center; position: relative; left: 20%">Your Account Profile</h1>
        </div>

        <div id="user-content"></div>

        <div id="tags-content"></div>

        <div id="account-editor"></div>

        <style>
            body {
                background-color: #f0f0f0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen","Ubuntu", "Cantarell", sans-serif;
                line-height: 1.6;
            }

            .user-content {
                display: flex;
                font-size: 20px;
                padding: 20px;
                gap: 20px;
                justify-content: center;
                align-items: center;
            }

            .tags-content {
                display: flex;
                font-size: 20px;
                padding: 20px;
                gap: 20px;
                justify-content: center;
                align-items: center;
            }

            /* .account-editor {
                display: flex;
                font-size: 20px;
                padding: 20px;
                gap: 20px;
                justify-content: center;
                align-items: center;
            } */

            .content-section {
                display: flex;
                background-color: #f0f0f0;
                position: relative;
                left: 20%;
                justify-content: left;
                align-items: center;
                font-size: 20px;
                padding: 15px;
                gap: 30px;
                flex-flow: row wrap;
                max-width: 50%;
            }

            .input-box {
                max-width: 400px;
                flex: 1 1 260px;
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 14px 20px;
                border-radius: 999px;
                background: var(--background-alt);
                border: 1px solid var(--border-color);
                box-shadow: var(--shadow);
            }

            .info-display {
                max-width: 400px;
                flex: 1;
                display: flex;
                align-items: center;
                padding: 10px;
                border-radius: 10px;
                border: 1px solid var(--border-color);
                box-shadow: var(--shadow);
                color: #aaaaaa;
                background-color: #f0f0f0;
            }

            .input-box input {
                border: none;
                outline: none;
                width: 100%;
                font-size: 20px;
                background: transparent;
                color: var(--text-dark);
            }

            .input-box input::placeholder {
                font-size: 20px;
                color: var(--text-light);
            }

            .button-style a {
                background-color: rgb(130, 130, 130);
                color: rgb(255, 255, 255);
                padding: 4px 10px;
                border-radius: 5px;
                text-decoration: none;
            }

            button {
                background-color: rgb(200, 200, 200);
                color: rgb(0, 0, 0);
                padding: 4px 10px;
                border-radius: 5px;
                text-decoration: none;
            }

            .editor-button {
                position: absolute;
                left: 70%;
            }

        </style>

        <script src="userAccount-page.js" type="module"></script>
    </body>
</html>
