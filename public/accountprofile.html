<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account</title>
    <link id="theme-stylesheet" href="light.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">

    <style>
        /* Account page — card-based layout, polished inputs + buttons */
        body { background: var(--background-alt); }

        .account-page {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 120px 20px 80px;
        }

        .account-card {
            width: 100%;
            max-width: 440px;
            background: var(--background);
            border: 1px solid var(--line-soft);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 44px 40px;
        }

        .account-card h1 {
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 2rem;
            letter-spacing: -0.02em;
            line-height: 1.15;
            text-align: center;
            margin-bottom: 6px;
            color: var(--text-dark);
        }

        .account-subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-item label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-item input,
        .form-item textarea {
            width: 100%;
            padding: 11px 14px;
            font-size: 14.5px;
            font-family: inherit;
            background: var(--background);
            color: var(--text-dark);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            transition: border-color .15s ease, box-shadow .15s ease;
        }

        .form-item input:focus,
        .form-item textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px var(--primary-soft);
        }

        .form-item textarea {
            resize: vertical;
            min-height: 84px;
            line-height: 1.5;
        }

        .form-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 18px;
        }

        .form-actions button {
            width: 100%;
            padding: 12px 20px;
            font-size: 14.5px;
            font-weight: 500;
            font-family: inherit;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: background .2s ease, transform .1s ease, border-color .2s ease;
        }

        .btn-primary {
            background: var(--primary-color);
            color: #fff;
            border: 1px solid var(--primary-color);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            border-color: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: var(--background);
            color: var(--text-dark);
            border: 1px solid var(--border-color);
        }

        .btn-ghost:hover {
            border-color: var(--text-dark);
            background: var(--background-alt);
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--border-color);
        }

        .btn-danger:hover {
            background: var(--background-alt);
            border-color: var(--danger);
        }

        .username-display {
            text-align: center;
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        .text-light { color: var(--text-light); }
        .text-dark { color: var(--text-dark); }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">hobbymatch</div>
            <ul class="nav-links">
                <li><a href="index_new.html">Home</a></li>
                <li><a href="community.html">Community</a></li>
                <li><a href="network_page.html">Connect</a></li>
                <li><a href="data_input.html" class="nav-cta">Take Quiz</a></li>
            </ul>
        </div>
    </nav>

    <main class="account-page">
        <div id="signed-out-content" class="account-card" style="visibility: hidden; position: fixed;">
            <h1>Welcome back</h1>
            <p class="account-subtitle">Sign in to save your matches and chats.</p>
            <div class="form">
                <div class="form-item">
                    <label for="username-input">Username</label>
                    <input type="text" name="username" id="username-input" placeholder="your-name" autocomplete="username">
                </div>
                <div class="form-item">
                    <label for="password-input">Password</label>
                    <input type="password" name="password" id="password-input" placeholder="••••••••" autocomplete="current-password">
                </div>
                <div class="form-actions">
                    <button id="sign-in-submit" class="btn-primary" type="button">Sign in</button>
                    <button id="create-account-submit" class="btn-ghost" type="button">Create an account</button>
                </div>
            </div>
        </div>

        <div id="signed-in-content" class="account-card" style="visibility: hidden; position: fixed;">
            <h1>Your account</h1>
            <p class="username-display" id="username-display"></p>
            <div class="form">
                <div class="form-item">
                    <label for="fullname-input">Full name</label>
                    <input type="text" name="fullname" id="fullname-input" placeholder="Your name">
                </div>
                <div class="form-item">
                    <label for="description-input">About you</label>
                    <textarea name="description" id="description-input" rows="4" placeholder="A few words about the hobbies you love..."></textarea>
                </div>
                <div class="form-actions">
                    <button id="save-changes-submit" class="btn-primary" type="button">Save changes</button>
                    <button id="sign-out-all-submit" class="btn-danger" type="button">Sign out (all devices)</button>
                </div>
            </div>
        </div>
    </main>


    <script src="account_page.js" type="module"></script>
    <script src="sidebar.js"></script>

</body>

</html>
