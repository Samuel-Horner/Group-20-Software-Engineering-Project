<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <title>HobbyMatch - Account Profile</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link id="theme-stylesheet" href="light.css" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
    </head>

    <body>
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">HobbyMatch</div>
                <ul class="nav-links">
                    <li><a href="index_new.html">Home</a></li>
                    <li><a href="community.html">Community</a></li>
                    <li><a href="network_page.html">Connect</a></li>
                    <li><a href="data_input.html" class="nav-cta">Take Quiz</a></li>
                </ul>
            <button id="settings-btn">⚙</button></div>
        </nav>

        <div id="main_content"></div>

        <div id="account-editor"></div>

        <style>
            .main_content {
                max-width: 1200px;
                margin: 0 auto;
                padding: 200px;
                background: var(--background);
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen","Ubuntu", "Cantarell", sans-serif;
                line-height: 1.6;
            }
            
            .content_section {
                display: flex;
                background-color: #f0f0f0;
                position: relative;
                top: 70px;
                justify-content: left;
                align-items: center;
                padding: 15px;
                gap: 30px;
                flex-flow: row wrap;
                max-width: 50%;
            }

            .input_box {
                max-width: 400px;
                flex: 1 1 260px;
                display: flex;
                align-items: center;
                gap: 10px;
                background: var(--background-alt);
                border: 1px solid var(--border-color);
            }

            .input_box input {
                border: none;
                outline: none;
                width: 100%;
                font-size: 20px;
                background: transparent;
                color: var(--text-dark);
            }

            .input_box input::placeholder {
                font-size: 20px;
                color: var(--text-light);
            }

            .hobby_tags_style a {
                background-color: rgb(200, 200, 200);
                color: rgb(0, 0, 0);
                padding: 4px 10px;
                border-radius: 5px;
                text-decoration: none;
            }

            button {
                background-color: rgb(200, 200, 200);
                color: rgb(0, 0, 0);
                padding: 4px 10px;
                border-radius: 5px;
                text-decoration: none;
            }

            .editor_button {
                position: absolute;
                left: 70%;
            }

        </style>

        <script src="userAccount-page.js" type="module"></script>
    </body>
</html>
