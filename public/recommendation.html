<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Hobby Recommendation</title>
    <link id="theme-stylesheet" href="light.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <style>
        body {
            background: var(--background-alt);
            padding: 80px 20px;
        }

        .rec-card {
            max-width: 720px;
            margin: 0 auto;
            background: var(--background);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            padding: 36px 32px;
            text-align: center;
        }

        .rec-title {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .rec-hobby {
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--primary-color);
            margin: 16px 0 24px;
        }

        .rec-actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .secondary-btn {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            color: var(--text-dark);
            background: var(--background);
            text-decoration: none;
            font-weight: 600;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
        }

        .secondary-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .scrolly-card {
            max-width: 720px;
            margin: 0 auto;
            background: var(--background);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            padding: 36px 32px;
            text-align: center;
            /* animation: scroller 4s ease-in; */
        }

        @keyframes scroller {
            from {opacity: 0;max-width: 500px;}
            to {opacity: 1; max-width: 720px;}
        }

        .scrolly-card.in-view {
            animation: scroller 5s ease-out;
        }
        
    </style>
</head>
<body>
    <div class="rec-card" style="margin-bottom: 10rem;">
        <h1 class="rec-title">Your Recommended Hobby</h1>
        <p>Based on your quiz answers, we think you'll enjoy:</p>
        <div id="hobbyName" class="rec-hobby">Loading...</div>
    </div>

    <!-- Information on the hobby -->
    <div class="scrolly-card animate">
        <h1 id="scrolly-title" class="rec-title">Results</h1>
        <!-- <p id="scrolly-description"></p>  -->
        <p id="scrolly-description">Your top 5 reccomended hobbies were ...</p> 

        <div id="scrolly-list"></div>
        
        <div class="rec-actions">
            <a class="cta-button" href="data_input.html">Retake Quiz</a>
            <a class="secondary-btn" href="index.html">Back to Home</a>
        </div> 
    </div>
    
    <script>
        // Constants
        const N_RECCOMENDATIONS = 5;
        const DESCRIPTIONS = {
            "Reading": "Reading is the activity of comprehending written language contained within resources such as books, magazines and newspapers.\nThe act of reading is a great way to learn about interesting and fun stories as a pastime by reading fiction-books, or to learn about new skills, technologies, sciences, and more from educational non-fiction books.\nBook clubs are a great way to meet other people who enjoy this hobby. Reading can also be a comparatively inexpensive hobby depending on the books you read, as libraries are a crucial resource for using books without the high price of certain books getting in the way.",
            "Gaming": "Gaming refers to the activity of playing video games or board games.\nConventions, and competitive tournaments can be used to meet fellow ‘gamers’ in person, while online-video games can let people play video games from around the world through an internet connection.\nBut while gaming can be a fun activity, it can also be expensive due to the high costs of gaming hardware and the video games themselves.",
            "Cooking": "Cooking is the activity of creating food. Recipe books are a good way to get started, as they provide step-by-step examples of how to make meals.\nYeah, that’s about it.",
            "Sports":  "Sports is a wide range of games involving physical exertion, which makes it a healthy hobby to pick up.\nExamples of sports are football, tennis, rugby, basketball, cricket."
        }
    </script>


    <script>
        function getCookie(name) {
            const cookies = document.cookie ? document.cookie.split(";") : [];
            for (const cookie of cookies) {
                const [key, ...rest] = cookie.split("=");
                if (key && key.trim() === name) {
                    return decodeURIComponent(rest.join("=") || "");
                }
            }
            return null;
        }

        function getQueryParam(name) {
            try {
                const params = new URLSearchParams(window.location.search);
                return params.get(name);
            } catch (err) {
                const query = window.location.search.replace(/^\?/, "");
                for (const pair of query.split("&")) {
                    const [key, value] = pair.split("=");
                    if (decodeURIComponent(key || "") === name) {
                        return decodeURIComponent(value || "");
                    }
                }
                return null;
            }
        }

        let storedHobby = getQueryParam("hobby");
        if (!storedHobby) {
            try {
                storedHobby = localStorage.getItem("userHobby");
            } catch (err) {
                storedHobby = null;
            }
        }

        if (!storedHobby) {
            storedHobby = getCookie("userHobby");
        }
        const hobbyNames = storedHobby || "No recommendation found. Please retake the quiz.";
        console.log("hobby names:", hobbyNames);


        const hobbyEl = document.getElementById("hobbyName");
        let _hobbyNames = JSON.parse(hobbyNames);
        if (hobbyEl) {
            let bestHobby = _hobbyNames[0][1];

            hobbyEl.textContent = bestHobby;
        }

        //-----------------------------------------------------------

        // THE RESULTS PANEL
        let descr = `Your top ${N_RECCOMENDATIONS} reccomended hobbies were:`
        document.getElementById("scrolly-description").innerHTML = "";

        // Adds 'in-view' attribute to the class to see if it is in view.
        document.addEventListener("DOMContentLoaded", () => {
            let intObserver = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('in-view');
                    }
                })
            });
            // Add observer to each element with the .animate class 
            let animElems = document.querySelectorAll(".animate");
            animElems.forEach( (elem) => intObserver.observe(elem));
        });

        // Update the description and appearence of the webpage based on the reccomended hobby
        for (let i=0; i<N_RECCOMENDATIONS; i++) {
            const p = Math.round(_hobbyNames[i][0]*10_000)/100;
            let e1 = document.createElement("h1");
            e1.className = "rec-hobby";
            e1.innerHTML = _hobbyNames[i][1];
            let e2 = document.createElement("p");
            e2.innerHTML = `With a confidence of ${p}%`;

            document.getElementById("scrolly-list").appendChild(e1);
            document.getElementById("scrolly-list").appendChild(e2);
        }
    </script>
    <script src="sidebar.js"></script>
</body>
</html>
