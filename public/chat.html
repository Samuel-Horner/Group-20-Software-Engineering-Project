<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HobbyMatch – Chat</title>
    <link id="theme-stylesheet" href="light.css" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />

    <style>
      /* Chat page styling using your existing theme variables from styles.css */
      .chat-shell {
        max-width: 900px;
        margin: 0 auto;
        padding: 100px 16px 40px;
      }

      .chat-header {
        background: var(--background);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 16px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .chat-title {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .chat-title h1 {
        font-family: var(--font-serif);
        font-size: 1.5rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: var(--text-dark);
      }

      .chat-title p {
        font-size: 13px;
        color: var(--text-light);
      }

      .back-link {
        text-decoration: none;
        font-weight: 500;
        font-size: 14px;
        color: var(--primary-color);
      }

      .back-link:hover {
        color: var(--primary-dark);
      }

      .chat-window {
        background: var(--background);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 16px;
        min-height: 420px;
        max-height: 520px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .msg-row {
        display: flex;
      }

      .msg-row.me {
        justify-content: flex-end;
      }

      .msg {
        max-width: 70%;
        padding: 10px 12px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
        background: var(--background-alt);
        color: var(--text-dark);
        box-shadow: var(--shadow);
        font-size: 14px;
        line-height: 1.4;
        word-wrap: break-word;
      }

      .msg-row.me .msg {
        background: var(--primary-soft);
        border-color: var(--primary-light);
        color: var(--text-dark);
      }

      .msg-meta {
        margin-top: 6px;
        font-size: 11px;
        color: var(--text-light);
      }

      .composer {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        align-items: center;
        background: var(--background);
        border: 1px solid var(--border-color);
        border-radius: 999px;
        box-shadow: var(--shadow);
        padding: 10px 12px;
      }

      .composer input {
        border: none;
        outline: none;
        width: 100%;
        font-size: 14px;
        background: transparent;
        color: var(--text-dark);
      }

      .send-btn {
        border: none;
        cursor: pointer;
        padding: 10px 18px;
        border-radius: var(--radius-pill);
        background: var(--primary-color);
        color: white;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        box-shadow: var(--shadow);
        transition: transform 0.06s ease, background 0.12s ease, box-shadow 0.12s ease;
      }

      .send-btn:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
        box-shadow: var(--shadow-lg);
      }

      .send-btn:active {
        transform: translateY(0);
        box-shadow: var(--shadow);
      }
    </style>
  </head>

  <body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">hobbymatch</div>
            <ul class="nav-links">
                <li><a href="index_new.html">Home</a></li>
                <li><a href="community.html">Community</a></li>
                <li><a href="network_page.html">Connect</a></li>
                <li><a href="data_input.html" class="nav-cta">Take Quiz</a></li>
            </ul>
        </div>
    </nav>

    <div class="chat-shell">
      <div class="chat-header">
        <div class="chat-title">
          <h1 id="chatWithTitle">Chat</h1>
          <p>Mock conversation — messages you type will appear below.</p>
        </div>
        <a class="back-link" href="network_page.html">← Back</a>
      </div>

      <div id="chatWindow" class="chat-window"></div>

      <form id="chatForm" class="composer">
        <input id="msgInput" type="text" placeholder="Type a message..." autocomplete="off" />
        <button class="send-btn" type="submit">Send</button>
      </form>
    </div>

    <script>
      // Read who we're chatting with from the URL: chat.html?name=Sarah%20Chen
      const params = new URLSearchParams(window.location.search);
      const chatName = params.get("name") || "Someone";

      // If you renamed your file to network.html, update the back link.
      // For now it points to: network_page.html (matches your current filename)
      document.getElementById("chatWithTitle").textContent = `Chat with ${chatName}`;

      const chatWindow = document.getElementById("chatWindow");
      const chatForm = document.getElementById("chatForm");
      const msgInput = document.getElementById("msgInput");

      // Storage key per person (so each profile has its own mock chat)
      const storageKey = `mockChat_${chatName}`;

      function timeNow() {
        const d = new Date();
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function addMessage(text, who = "me", timestamp = timeNow()) {
        const row = document.createElement("div");
        row.className = `msg-row ${who}`;

        const bubble = document.createElement("div");
        bubble.className = "msg";
        bubble.textContent = text;

        const meta = document.createElement("div");
        meta.className = "msg-meta";
        meta.textContent = timestamp;

        bubble.appendChild(meta);
        row.appendChild(bubble);
        chatWindow.appendChild(row);

        // scroll to bottom
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function loadConversation() {
        const raw = localStorage.getItem(storageKey);
        if (!raw) {
          // Mock starter messages (optional)
          addMessage(`Hey! I'm ${chatName}.`, "them");
          addMessage("Hi! 👋", "me");
          saveConversation();
          return;
        }

        const msgs = JSON.parse(raw);
        msgs.forEach((m) => addMessage(m.text, m.who, m.time));
      }

      function saveConversation() {
        // Rebuild messages from DOM into localStorage
        const msgs = [];
        document.querySelectorAll(".msg-row").forEach((row) => {
          const who = row.classList.contains("me") ? "me" : "them";
          const bubble = row.querySelector(".msg");
          const meta = row.querySelector(".msg-meta");
          const time = meta ? meta.textContent : "";
          // bubble text includes meta text; so take only the first text node
          const text = bubble.childNodes[0]?.textContent?.trim() || "";
          msgs.push({ who, text, time });
        });
        localStorage.setItem(storageKey, JSON.stringify(msgs));
      }

      chatForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = msgInput.value.trim();
        if (!text) return;

        addMessage(text, "me");
        msgInput.value = "";
        saveConversation();
      });

      loadConversation();
      msgInput.focus();
    </script>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>HobbyMatch</h4>
                    <p>Connecting people with their perfect hobbies</p>
                </div>
                <div class="footer-section">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="index_new.html">Home</a></li>
                        <li><a href="community.html">Community</a></li>
                        <li><a href="network_page.html">Connect</a></li>
                        <li><a href="data_input.html">Take Quiz</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>Contact</h4>
                    <p>University of Bath<br>Bath, UK</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="sidebar.js"></script>
  </body>
</html>
